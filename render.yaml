services:
  - type: web
    name: urban-disorder-survey
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /data
      - key: SAMPLE_SIZE
        value: 30
      - key: TARGET_RATINGS
        value: 3
    disk:
      name: survey-data
      mountPath: /data
      sizeGB: 1
